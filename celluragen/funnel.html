<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#032341;
  --hover:#345e83;
  --accent:#fd6065;
  --bg:#ffffff;
  --text:#032341;
  --text-sub:#5a7a96;
  --text-muted:#8fa5b8;
  --card-bg:#f6f9fc;
  --card-border:#e4ecf2;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;touch-action:pan-y}

.funnel-container{position:relative;width:100%;max-width:560px;margin:0 auto;height:100vh;height:100dvh;overflow:hidden}

.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;padding:0 24px;padding-bottom:calc(20px + var(--safe-bottom));transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .45s ease;will-change:transform,opacity;opacity:0;pointer-events:none}
.slide[data-pos="center"]{transform:translateX(0);opacity:1;pointer-events:auto}
.slide[data-pos="left"]{transform:translateX(-100%);opacity:0}
.slide[data-pos="right"]{transform:translateX(100%);opacity:0}

.slide-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 8px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:700;letter-spacing:.08em;color:var(--primary)}
.progress-dots{display:flex;gap:5px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--card-border);transition:all .3s ease}
.dot.active{background:var(--primary);width:22px;border-radius:4px}
.dot.done{background:var(--primary)}

.slide-content{flex:1;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-height:0}
.slide-content::-webkit-scrollbar{display:none}

.slide-footer{flex-shrink:0;padding-top:12px;text-align:center}
.slide-footer .powered{font-size:11px;color:var(--text-muted);margin-top:10px}
.slide-footer .powered strong{color:var(--text-sub)}

/* Buttons */
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;background:var(--primary);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s,transform .2s}
.btn-primary:hover{background:var(--hover);transform:translateY(-1px)}
.btn-accent{background:var(--accent)}
.btn-accent:hover{background:#e8474c}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;background:transparent;color:var(--primary);border:2px solid var(--primary);border-radius:4px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-ghost{background:none;border:none;color:var(--text-muted);font-size:13px;font-family:inherit;cursor:pointer;padding:8px;margin-top:8px}
.btn-ghost:hover{color:var(--text-sub)}

/* Language chooser */
.lang-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:32px}
.lang-screen h1{font-size:28px;font-weight:700;letter-spacing:-.02em}
.lang-btns{display:flex;gap:16px}
.lang-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:140px;height:56px;background:var(--card-bg);border:2px solid var(--card-border);border-radius:4px;font-family:inherit;font-size:16px;font-weight:600;color:var(--primary);cursor:pointer;transition:all .2s}
.lang-btn:hover{border-color:var(--primary);background:var(--primary);color:#fff}

/* Hero */
.hero-center{text-align:center}
.hero-center h1{font-size:26px;font-weight:700;line-height:1.25;letter-spacing:-.02em;margin-bottom:12px}
.hero-center p{font-size:15px;color:var(--text-sub);line-height:1.6;margin-bottom:24px}
.trust-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:28px}
.trust-tag{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:3px;font-size:12px;font-weight:600;color:var(--primary);white-space:nowrap}
.trust-tag .icon{font-size:16px}

/* Problem metrics */
.section-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-.01em}
.section-sub{font-size:14px;color:var(--text-sub);text-align:center;margin-bottom:24px}
.metric-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:4px;padding:20px;text-align:center;margin-bottom:12px}
.metric-card .metric-num{font-size:32px;font-weight:800;color:var(--primary);letter-spacing:-.02em}
.metric-card .metric-num .accent{color:var(--accent)}
.metric-card .metric-label{font-size:13px;color:var(--text-sub);margin-top:4px;line-height:1.4}

/* Solution cards */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sol-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:4px;padding:16px;text-align:left}
.sol-card .card-icon{font-size:24px;margin-bottom:8px}
.sol-card .card-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:4px}
.sol-card .card-desc{font-size:12px;color:var(--text-sub);line-height:1.5}

/* Phone mockup */
.phone-mockup{width:220px;margin:0 auto 16px;background:#000;border-radius:28px;padding:10px;box-shadow:0 12px 40px rgba(3,35,65,.15)}
.phone-screen{background:var(--primary);border-radius:20px;padding:16px 12px;min-height:320px;display:flex;flex-direction:column;justify-content:space-between}
.phone-screen .ps-step{background:rgba(255,255,255,.1);border-radius:3px;padding:8px 10px;margin-bottom:6px;font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:8px}
.phone-screen .ps-step .num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.phone-screen .ps-step.active{background:rgba(253,96,101,.3);border:1px solid rgba(253,96,101,.5)}
.phone-screen .ps-cta{background:var(--accent);border-radius:3px;padding:8px;text-align:center;font-size:11px;font-weight:700;color:#fff;margin-top:8px}

/* Dashboard preview */
.dash-preview{background:var(--card-bg);border:1px solid var(--card-border);border-radius:4px;padding:16px;margin-bottom:16px}
.dash-row{display:flex;gap:10px;margin-bottom:10px}
.dash-row:last-child{margin-bottom:0}
.dash-mini{flex:1;background:#fff;border:1px solid var(--card-border);border-radius:3px;padding:12px;text-align:center}
.dash-mini .dm-val{font-size:22px;font-weight:800;color:var(--primary)}
.dash-mini .dm-val.green{color:#22c55e}
.dash-mini .dm-val.red{color:var(--accent)}
.dash-mini .dm-label{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Nav arrows */
.nav-row{display:flex;gap:10px;margin-top:8px}
.nav-row .btn-primary,.nav-row .btn-outline{flex:1}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-up{animation:fadeUp .5s ease both}
.anim-d1{animation-delay:.1s}
.anim-d2{animation-delay:.2s}
.anim-d3{animation-delay:.3s}
.anim-d4{animation-delay:.4s}

/* CountUp */
.count-up{display:inline-block}

@media(max-width:380px){
  .hero-center h1{font-size:22px}
  .section-title{font-size:19px}
  .card-grid{grid-template-columns:1fr}
  .phone-mockup{width:180px}
  .phone-screen{min-height:260px}
  .metric-card .metric-num{font-size:26px}
  .trust-bar{gap:8px}
  .trust-tag{font-size:11px;padding:5px 10px}
}
</style>
</head>

  // ── Build progress dots ──
  function buildDots() {
    for (var s = 1; s <= TOTAL_SLIDES; s++) {
      var container = document.getElementById('dots-' + s);
      if (!container) continue;
      container.innerHTML = '';
      for (var d = 1; d <= TOTAL_SLIDES; d++) {
        var dot = document.createElement('span');
        dot.className = 'dot';
        if (d < s) dot.className += ' done';
        if (d === s) dot.className += ' active';
        container.appendChild(dot);
      }
    }
  }
  buildDots();

  // ── Slide navigation ──
  function goSlide(target) {
    if (target < 0 || target > TOTAL_SLIDES) return;
    var oldEl = document.getElementById('slide-' + current);
    var newEl = document.getElementById('slide-' + target);
    if (!oldEl || !newEl) return;
    oldEl.dataset.pos = target > current ? 'left' : 'right';
    newEl.dataset.pos = 'center';
    current = target;

    // Trigger countUp when entering slide 2
    if (target === 2) runCountUps();

    // Tracker integration
    if (window.GROWTHER_TRACKER && target > 0) GROWTHER_TRACKER.onStepChange(target);
  }
  window.goSlide = goSlide;

  // ── Language selection ──
  window.setLang = function(lang) {
    window.currentLang = lang;
    renderLang(lang);
    goSlide(1);
  };

  // ── CountUp animation ──
  var countUpDone = false;
  function runCountUps() {
    if (countUpDone) return;
    countUpDone = true;
    var els = document.querySelectorAll('.count-up');
    for (var i = 0; i < els.length; i++) {
      (function(el) {
        var target = parseInt(el.dataset.target, 10);
        var duration = 1200;
        var start = 0;
        var startTime = null;
        function step(ts) {
          if (!startTime) startTime = ts;
          var progress = Math.min((ts - startTime) / duration, 1);
          var eased = 1 - Math.pow(1 - progress, 3);
          var val = Math.round(eased * target);
          el.textContent = val.toLocaleString('tr-TR');
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      })(els[i]);
    }
  }

  // ── Expose for tracker ──
  window.GROWTHER_FUNNEL = {
    getCurrentStep: function() { return current; },
    getAnswers: function() { return { lang: window.currentLang }; }
  };

  // ── Swipe support ──
  var startX = 0, startY = 0;
  document.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0 && current < TOTAL_SLIDES) goSlide(current + 1);
    if (dx > 0 && current > 0) goSlide(current - 1);
  }, { passive: true });

  // Pre-render TR as default (hidden until lang selected)
  renderLang('tr');

})();
</script>
